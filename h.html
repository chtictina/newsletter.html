<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Card Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Dark Mode Toggle -->
    <div class="top-bar">
        <button id="darkBtn">Dark Mode</button>
    </div>

    <!-- Loading Spinner -->
    <div class="spinner"></div>

    <!-- Card Container -->
    <section class="container">

        <div class="card">
            <img src="https://via.placeholder.com/300x180" alt="">
            <h2>Web Development</h2>
            <p>Learn HTML, CSS, JavaScript and responsive design.</p>
            <button>Read More</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x180" alt="">
            <h2>Artificial Intelligence</h2>
            <p>Explore machine learning and AI technologies.</p>
            <button>Read More</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x180" alt="">
            <h2>Cyber Security</h2>
            <p>Protect systems and networks from cyber threats.</p>
            <button>Read More</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x180" alt="">
            <h2>Cloud Computing</h2>
            <p>Understand cloud services and online infrastructure.</p>
            <button>Read More</button>
        </div>

    </section>

<script>
    const btn = document.getElementById("darkBtn");

    btn.onclick = function () {
        document.body.classList.toggle("dark");
    };
</script>

</body>
</html>
